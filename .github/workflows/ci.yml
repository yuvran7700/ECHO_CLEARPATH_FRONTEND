name: Frontend CI

on:
  pull_request:
    branches:
      - "main"
      - "develop"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # 1. LINTING + FORMATTING CHECK
      - name: Run ESLint
        run: npm run lint

      # 2. UNIT TESTING
      - name: Run unit tests
        run: npm run test -- --watchAll=false --testPathPattern="tests/unit"

      # 3. INTEGRATION TESTING
      - name: Run integration tests
        run: npm run test -- --watchAll=false --testPathPattern="tests/integration"

      # 4. COVERAGE TESTING
      - name: Run coverage
        run: npm run test -- --watchAll=false --coverage --coverageDirectory=coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-testing-report
          path: coverage/

      # 5. BUILD CHECK
      - name: Build
        run: npm run build